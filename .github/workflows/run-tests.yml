name: Run tests

env:
  CONAN_VER: 2.12
  CLANG_FORMAT_VER: 21.1.8
  BUILD_DIR: build

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
  pull_request:
  workflow_dispatch:

jobs:
# =============================================================================
# Private repository jobs (self-hosted runners)
# =============================================================================

  linux-build:
    name: Linux build (private)
    if: >
      github.repository == 'AdGuardSoftwareLimited/trusttunnel-client' &&
      !startsWith(github.event.head_commit.message, 'skipci:')
    runs-on:
      - ephemeral
      - ephemeral-linux
      - registry.int.agrd.dev/linux/corelibs-builder:20260501-2313
      - ephemeral-limit-memory-8192
      - ephemeral-limit-cpu-6
      - ephemeral-limit-disk-gb-70
    container:
      image: adguard/core-libs:2.9
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Conan
        run: |
          python3 -m pip install conan --upgrade
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

      - name: Lint C++
        run: |
          make lint-cpp

      - name: Build and run tests
        run: |
          make test-rust

          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS='-fsanitize=address' \
            -DCMAKE_CXX_FLAGS='-fsanitize=address -stdlib=libc++' \
            -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address' \
            -GNinja \
            ..
          ninja tests
          ctest -D ExperimentalTest --no-compress-output --output-on-failure

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-linux-private
          path: '**/Testing/*/*.xml'

      - name: Upload to Conan and cleanup
        if: always()
        run: |
          conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}" || true
          conan upload -r art -c "*" 2>&1 | grep "Uploading" || true
          echo "conan upload finished"
          conan remove -c "*" || true
          conan cache clean || true

  win-build:
    name: Windows build (private)
    if: >
      github.repository == 'AdGuardSoftwareLimited/trusttunnel-client' &&
      !startsWith(github.event.head_commit.message, 'skipci:')
    runs-on:
      - ephemeral
      - ephemeral-windows
      - registry.int.agrd.dev/windows/windows11-github-msvc2022:20260505-1859
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and run tests
        run: |
          $ErrorActionPreference = 'Stop'

          & conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }}

          # Save vcvars to switch between them
          $vcvars64 = cmd /c "vcvars64 & set"
          function setvar($_) {
            if ($_ -match "=") {
              $v = $_.split("="); set-item -force -path "ENV:\$($v[0])"  -value "$($v[1])"
            }
          }

          & cargo test --workspace --manifest-path trusttunnel/setup_wizard/Cargo.toml
          if (!$?) { exit 1 }

          & {
            $vcvars64 | foreach { setvar $_ }
            mkdir build
            pushd build
            & cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_C_COMPILER="cl.exe" `
              -DCMAKE_CXX_COMPILER="cl.exe" `
              -G Ninja ..
            if (!$?) { exit 1 }
            & ninja tests
            if (!$?) { exit 1 }
            & ctest -D ExperimentalTest --no-compress-output --output-on-failure
            if (!$?) { exit 1 }
            popd
          }
        shell: powershell

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-windows-private
          path: '**/Testing/*/*.xml'

      - name: Upload to Conan and cleanup
        if: always()
        run: |
          $ErrorActionPreference = 'Continue'
          & conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}"
          & conan upload -r art -c "*" 2>&1 | Select-String "Uploading" -SimpleMatch
          Write-Host "conan upload finished with status $LASTEXITCODE"
          & conan remove -c "*"
          & conan cache clean
        shell: powershell

  mac-build:
    name: Mac build (private)
    if: >
      github.repository == 'AdGuardSoftwareLimited/trusttunnel-client' &&
      !startsWith(github.event.head_commit.message, 'skipci:')
    runs-on:
      - ephemeral
      - ephemeral-mac
      - ${{ vars.BUILD_IMAGE_VERSION_MACOS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and run tests
        run: |
          rm -rf venv
          python3 -m venv venv
          source ./venv/bin/activate

          python3 -m pip install conan
          conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

          make test-rust

          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -GNinja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS='-fsanitize=address' \
            -DCMAKE_CXX_FLAGS='-fsanitize=address -stdlib=libc++' \
            -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address' \
            ..
          ninja tests
          ctest -D ExperimentalTest --no-compress-output --output-on-failure

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-macos-private
          path: '**/Testing/*/*.xml'

      - name: Upload to Conan and cleanup
        if: always()
        run: |
          source ./venv/bin/activate
          conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}" || true
          conan upload -r art -c "*" 2>&1 | grep "Uploading" || true
          echo "conan upload finished"
          conan remove -c "*" || true
          conan cache clean || true

# =============================================================================
# Public repository jobs (GitHub-hosted runners)
# =============================================================================

  Linux:
    runs-on: ubuntu-latest
    env:
      LLVM_MAJOR_VER: 21
    if: >
      github.repository == 'TrustTunnel/TrustTunnelClient' &&
      !startsWith(github.event.head_commit.message, 'skipci:')
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install packages
        run: |
          sudo apt install -y ninja-build
          pip install -r requirements.txt
          pip install conan~=$CONAN_VER
          pip install clang-format~=$CLANG_FORMAT_VER
          ## Install LLVM
          curl -O https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $LLVM_MAJOR_VER
          rm ./llvm.sh
          sudo apt install -y libc++-${LLVM_MAJOR_VER}-dev libclang-rt-${LLVM_MAJOR_VER}-dev
          sudo apt install clang-tidy-${LLVM_MAJOR_VER}
          echo "/usr/lib/llvm-$LLVM_MAJOR_VER/bin" >> $GITHUB_PATH
          ## Add python's bin dir to path to ensure the correct clang-format version
          PY_BIN=$(python3 -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          echo "$PY_BIN" >> $GITHUB_PATH

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache

      - name: Cargo cache
        uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Conan cache
        uses: actions/cache@v4
        id: conan-cache
        with:
          path: ~/.conan2/
          key: ${{ runner.os }}-conan2-v4-${{ hashFiles('conanfile.py') }}
          restore-keys: ${{ runner.os }}-conan2-v4-

      - name: Bootstrap conan
        if: steps.conan-cache.outputs.cache-hit != 'true'
        run: |
          ./scripts/bootstrap_conan_deps.py

      - name: Lint
        run: |
          make lint-cpp

      - name: Run cmake
        run: |
          mkdir -p $BUILD_DIR && cd $BUILD_DIR && \
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="clang" \
            -DCMAKE_CXX_COMPILER="clang++" \
            -DCMAKE_C_FLAGS="-fsanitize=address" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DIPV6_UNAVAILABLE=ON \
            -GNinja \
            ..

      - name: Cache built conan packages
        uses: actions/cache/save@v4
        if: steps.conan-cache.outputs.cache-hit != 'true'
        with:
          path: ~/.conan2/
          key: ${{ runner.os }}-conan2-v4-${{ hashFiles('conanfile.py') }}

      - name: Build tests
        run: |
          cmake --build $BUILD_DIR --target tests

      - name: Run tests
        run: |
          make test-rust
          cd $BUILD_DIR && \
          ctest --no-compress-output --output-on-failure

# -------------------------------------------------------------

  MacOS:
    runs-on: macos-latest
    if: >
      github.repository == 'TrustTunnel/TrustTunnelClient' &&
      !startsWith(github.event.head_commit.message, 'skipci:')
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install packages
        run: |
          brew install ninja llvm@21
          sed -i '' 's/_LIBCPP_INTRODUCED_IN_LLVM_21 1/_LIBCPP_INTRODUCED_IN_LLVM_21 0/g' "$(brew --prefix llvm@21)/include/c++/v1/__configuration/availability.h"
          pip install -r requirements.txt
          pip install conan~=$CONAN_VER
          pip install clang-format~=$CLANG_FORMAT_VER
          echo "/opt/homebrew/opt/llvm@21/bin" >> $GITHUB_PATH
          ## Add python's bin dir to path to ensure the correct clang-format version
          PY_BIN=$(python3 -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          echo "$PY_BIN" >> $GITHUB_PATH

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache

      - name: Cargo cache
        uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Conan cache
        uses: actions/cache@v4
        id: conan-cache
        with:
          path: ~/.conan2/
          key: ${{ runner.os }}-conan2-v4-1-${{ hashFiles('conanfile.py') }}
          restore-keys: ${{ runner.os }}-conan2-v4-1-

      - name: Bootstrap conan
        if: steps.conan-cache.outputs.cache-hit != 'true'
        run: |
          ./scripts/bootstrap_conan_deps.py

      - name: Run cmake
        run: |
          mkdir -p $BUILD_DIR && cd $BUILD_DIR && \
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="clang" \
            -DCMAKE_CXX_COMPILER="clang++" \
            -DCMAKE_C_FLAGS="-fsanitize=address" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DIPV6_UNAVAILABLE=ON \
            -GNinja \
            ..

      - name: Cache built conan packages
        uses: actions/cache/save@v4
        if: steps.conan-cache.outputs.cache-hit != 'true'
        with:
          path: ~/.conan2/
          key: ${{ runner.os }}-conan2-v4-1-${{ hashFiles('conanfile.py') }}

      - name: Build tests
        run: |
          cmake --build $BUILD_DIR --target tests

      - name: Run tests
        run: |
          # Needed to avoid a sanitizer error (likely to be false positive)
          # inside gtest
          export ASAN_OPTIONS=detect_container_overflow=0

          make test-rust
          cd $BUILD_DIR && \
          ctest --no-compress-output --output-on-failure

# -------------------------------------------------------------

  Windows:
    runs-on: windows-latest
    env:
      MSVC_VER: 17
      MSVC_YEAR: 2022
    if: >
      github.repository == 'TrustTunnel/TrustTunnelClient' &&
      !startsWith(github.event.head_commit.message, 'skipci:')
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install packages
        run: |
          choco install strawberryperl nasm
          pip install conan~=${{ env.CONAN_VER }}

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache

      - name: Cargo cache
        uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Conan cache
        uses: actions/cache@v4
        id: conan-cache
        with:
          path: ~/.conan2/
          key: ${{ runner.os }}-conan2-v4${{ hashFiles('conanfile.py') }}
          restore-keys: ${{ runner.os }}-conan2-v4-

      - name: Bootstrap conan
        if: steps.conan-cache.outputs.cache-hit != 'true'
        run: |
          python ./scripts/bootstrap_conan_deps.py

      - name: Run cmake
        run: |
          mkdir ${{ env.BUILD_DIR }} && cd ${{ env.BUILD_DIR }} && `
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_C_COMPILER_LAUNCHER=ccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
            -DCMAKE_C_COMPILER="cl.exe" `
            -DCMAKE_CXX_COMPILER="cl.exe" `
            -DIPV6_UNAVAILABLE=ON `
            -G "Ninja" `
            ..

      - name: Cache built conan packages
        uses: actions/cache/save@v4
        if: steps.conan-cache.outputs.cache-hit != 'true'
        with:
          path: ~/.conan2/
          key: ${{ runner.os }}-conan2-v4-${{ hashFiles('conanfile.py') }}

      - name: Build tests
        run: |
          cmake --build ${{ env.BUILD_DIR }} `
            --target tests `
            --config RelWithDebInfo

      - name: Run tests
        run: |
          cargo test --workspace --manifest-path trusttunnel/setup_wizard/Cargo.toml
          cd ${{ env.BUILD_DIR }} && `
          ctest --no-compress-output --output-on-failure
