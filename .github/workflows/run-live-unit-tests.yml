name: Run live unit tests

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  resolve-images:
    if: github.repository == 'AdGuardSoftwareLimited/trusttunnel-client'
    uses: AdGuardSoftwareLimited/native-libs-common/.github/workflows/resolve-images.yml@master

  run-live-unit-tests:
    name: Run live unit tests
    if: github.repository == 'AdGuardSoftwareLimited/trusttunnel-client'
    needs: [resolve-images]
    runs-on:
      - ephemeral
      - ephemeral-linux
      - ${{ needs.resolve-images.outputs.corelibs-builder }}
      - ephemeral-limit-memory-8192
      - ephemeral-limit-cpu-6
    container:
      image: adguard/core-libs:2.11
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and run live unit tests
        env:
          CONAN_REPO_URL: ${{ vars.CONAN_REPO_URL }}
          # Builds go through the CMake presets; see CMakePresets.json.
          PRESET: clang-relwithdebinfo
          CMAKE_ARGS: -DVPNLIBS_ENABLE_LIVE_TESTS=ON
          # The image already provides the Conan dependencies.
          SKIP_BOOTSTRAP: 1
        run: |
          set -x -e

          python3 -m pip install conan --upgrade
          conan remote add --index 0 art ${CONAN_REPO_URL} || true

          make test-live

      - name: Upload to Conan and cleanup
        if: always()
        run: |
          conan remote login art "${{ secrets.ARTIFACTORY_USER }}" --password "${{ secrets.ARTIFACTORY_API_KEY }}" || true
          conan upload -r art -c "*" 2>&1 | grep "Uploading" || true
          echo "conan upload finished"
          conan remove -c "*" || true
          conan cache clean || true
