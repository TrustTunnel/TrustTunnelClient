name: Setup workflows for repository

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'

jobs:
  disable-private-workflows:
    name: Disable workflows with private uses
    if: github.repository == 'TrustTunnel/TrustTunnelClient'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Disable workflows with private uses
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Get all workflow states once
          gh workflow list -a --json path,state | jq -c '.[]' | while read -r entry; do
            path=$(echo "$entry" | jq -r '.path')
            state=$(echo "$entry" | jq -r '.state')

            # Skip non-local workflows (e.g., dynamic/github-code-scanning/codeql)
            [ -f "$path" ] || continue

            should_disable=false

            # 1. Uses reusable workflows from private org
            if grep -Eq '^\s+uses:.*AdGuardSoftwareLimited' "$path"; then
              should_disable=true
            # 2. All jobs guard on private repo, none on public
            elif grep -Eq "github\.repository == 'AdGuardSoftwareLimited/" "$path" && \
                 ! grep -Eq "github\.repository == 'TrustTunnel/" "$path"; then
              should_disable=true
            fi

            if [ "$should_disable" = "true" ]; then
              workflow_name=$(basename "$path")
              echo "Found private-only workflow: $workflow_name"

              if [ "$state" = "active" ]; then
                echo "  Disabling workflow"
                gh workflow disable "$workflow_name"
              else
                echo "  Already disabled (state: $state), skipping"
              fi
            fi
          done

  disable-public-workflows:
    name: Disable public-only workflows in private repo
    if: github.repository == 'AdGuardSoftwareLimited/trusttunnel-client'
    runs-on: [team-corelibs]
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Disable public-only workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Get all workflow states once
          gh workflow list -a --json path,state | jq -c '.[]' | while read -r entry; do
            path=$(echo "$entry" | jq -r '.path')
            state=$(echo "$entry" | jq -r '.state')

            # Skip non-local workflows
            [ -f "$path" ] || continue

            # Match jobs that only run on public repo
            if grep -Eq "github\.repository == 'TrustTunnel/" "$path" && \
               ! grep -Eq "github\.repository == 'AdGuardSoftwareLimited/" "$path"; then
              workflow_name=$(basename "$path")
              echo "Found public-only workflow: $workflow_name"

              if [ "$state" = "active" ]; then
                echo "  Disabling workflow"
                gh workflow disable "$workflow_name"
              else
                echo "  Already disabled (state: $state), skipping"
              fi
            fi
          done
